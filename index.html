<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Organiser</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                  <img src="./FullLogo_Transparent_NoBuffer.png" alt="StudyFlow Logo" />
                </div>
                <h2>StudyFlow</h2>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-link active">🏠Dashboard</a>
                <a href="#" class="nav-link">✅ Tasks</a>
                <a href="#" class="nav-link">🗓Calendar</a>
                <a href="#" class="nav-link">🕙Upcoming</a>
            </nav>

            <div class="sidebar-bottom">
                <p>Stay Focused!</p>
                <span>Once at a Time!</span>
            </div>
        </aside>

        <main class="main-content">

      <header class="topbar">
        <div>
          <p class="greeting">Welcome back,</p>
          <h1>Uddhav 👋</h1>
        </div>

        <div class="date-box">
          <span id="currentDate"></span>
        </div>
      </header>

      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon purple">📚</div>
          <div>
            <p>Total Tasks</p>
            <h2 id="totalTasks">0</h2>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon orange">⏳</div>
          <div>
            <p>Pending</p>
            <h2 id="pendingTasks">0</h2>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div>
            <p>Completed</p>
            <h2 id="completedTasks">0</h2>
          </div>
        </div>
      </section>

      <section class="add-task-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">PLAN YOUR WORK</p>
            <h2>Add a new task</h2>
          </div>
        </div>

        <form id="taskForm" class="task-form">
          <input
            type="text"
            id="taskTitle"
            placeholder="Task title (e.g. Java assignment)"
            required
          />

          <input
            type="text"
            id="taskSubject"
            placeholder="Subject / Category"
            required
          />

          <input type="date" id="taskDate" required />

          <select id="taskPriority" required>
            <option value="" disabled selected>Priority</option>
            <option value="high">High Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="low">Low Priority</option>
          </select>

          <button type="submit">+ Add Task</button>
        </form>
      </section>

      <section class="tasks-section" id="tasks">
        <div class="tasks-header">
          <div>
            <p class="eyebrow">YOUR WORKSPACE</p>
            <h2>My Tasks</h2>
          </div>

          <div class="filters">
            <select id="filterTasks">
              <option value="all">All Tasks</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
              <option value="high">High Priority</option>
              <option value="medium">Medium Priority</option>
              <option value="low">Low Priority</option>
            </select>
          </div>
        </div>

        <div id="taskList" class="task-list"></div>
        
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">😔</div>
          <h3>No tasks yet</h3>
          <p>Add your first task and take control of your deadlines.</p>
        </div>
      </section>
        
    </main>
</div>

<script src="script.js"></script>

</body>
</html>
